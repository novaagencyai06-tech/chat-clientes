<!DOCTYPE html>
<html>
<head>
  <title>Chat de reservas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #e5ddd5;
    }

    #chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    #header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .user {
      align-self: flex-end;
      background: #dcf8c6;
      padding: 10px;
      border-radius: 10px;
      margin: 5px;
      max-width: 70%;
    }

    .bot {
      align-self: flex-start;
      background: white;
      padding: 10px;
      border-radius: 10px;
      margin: 5px;
      max-width: 70%;
    }

    #input-area {
      display: flex;
      padding: 10px;
      background: #f0f0f0;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border: none;
      background: #075e54;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="chat-container">

  <div id="header">Reservas online</div>

  <div id="chat"></div>

  <div id="input-area">
    <input id="mensaje" placeholder="Escribe tu mensaje...">
    <button onclick="enviar()">Enviar</button>
  </div>

</div>

<script>
async function enviar() {
  const input = document.getElementById("mensaje");
  const texto = input.value;

  if (!texto) return;

  const chat = document.getElementById("chat");

  // mensaje usuario
  const user = document.createElement("div");
  user.className = "user";
  user.innerText = texto;
  chat.appendChild(user);

  input.value = "";

  // escribiendo
  const typing = document.createElement("div");
  typing.className = "bot";
  typing.innerText = "Escribiendo...";
  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

  try {
    const url = "https://nova-agency06.app.n8n.cloud/webhook/chat"
      + encodeURIComponent(texto) 
      + "&negocio=barberia_demo";

    const res = await fetch(url);

    let data;

    // intentar como JSON
    try {
      const json = await res.json();
      data = json.respuesta || json.mensaje || JSON.stringify(json);
    } catch {
      // si no es JSON, leer como texto
      data = await res.text();
    }

    typing.remove();

    const bot = document.createElement("div");
    bot.className = "bot";
    bot.innerText = data;
    chat.appendChild(bot);

    chat.scrollTop = chat.scrollHeight;

  } catch (error) {
    typing.remove();

    const bot = document.createElement("div");
    bot.className = "bot";
    bot.innerText = "Error al conectar 😅";
    chat.appendChild(bot);
  }
}
</script>

</body>
</html>
