<!DOCTYPE html>
<html>
<head>
  <title>Chat de reservas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #chat-container {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      height: 500px;
    }

    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .user {
      text-align: right;
      margin: 5px;
    }

    .bot {
      text-align: left;
      margin: 5px;
    }

    input {
      border: none;
      padding: 15px;
      width: 70%;
    }

    button {
      width: 30%;
      background: black;
      color: white;
      border: none;
    }

    #input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }
  </style>
</head>
<body>

<div id="chat-container">
  <div id="chat"></div>

  <div id="input-area">
    <input id="mensaje" placeholder="Escribe aquí...">
    <button onclick="enviar()">Enviar</button>
  </div>
</div>

<script>
async function enviar() {
  const mensajeInput = document.getElementById("mensaje");
  const mensaje = mensajeInput.value;

  if (!mensaje) return;

  const chat = document.getElementById("chat");

  // Mensaje usuario
  chat.innerHTML += `<div class="user"><b>Tú:</b> ${mensaje}</div>`;
  mensajeInput.value = "";

  // 👇 "Escribiendo..."
  const typing = document.createElement("div");
  typing.className = "bot";
  typing.innerText = "Escribiendo...";
  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

  const url = "https://nova-agency06.app.n8n.cloud/webhook/chat?message=" 
    + encodeURIComponent(mensaje) 
    + "&negocio=barberia_demo";

  const res = await fetch(url);
  const data = await res.text();

  // 👇 quitar "Escribiendo..."
  typing.remove();

  // Respuesta del bot
  chat.innerHTML += `<div class="bot"><b>Bot:</b> ${data}</div>`;

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
