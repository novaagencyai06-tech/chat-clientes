<!DOCTYPE html>
<html>
<head>
  <title>Chat de reservas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #e5ddd5;
    }

    #chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    #header {
      background: #075e54;
      color: white;
      padding: 15px;
      font-weight: bold;
      text-align: center;
    }

    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .user {
      align-self: flex-end;
      background: #dcf8c6;
      padding: 10px;
      border-radius: 10px;
      margin: 5px;
      max-width: 70%;
    }

    .bot {
      align-self: flex-start;
      background: white;
      padding: 10px;
      border-radius: 10px;
      margin: 5px;
      max-width: 70%;
    }

    #input-area {
      display: flex;
      background: #f0f0f0;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #075e54;
      color: white;
      border-radius: 20px;
    }
  </style>
</head>

<body>

<div id="chat-container">

  <div id="header">
    Reservas online
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <input id="mensaje" placeholder="Escribe tu mensaje...">
    <button onclick="enviar()">Enviar</button>
  </div>

</div>

<script>
async function enviar() {
  const mensajeInput = document.getElementById("mensaje");
  const mensaje = mensajeInput.value;

  if (!mensaje) return;

  const chat = document.getElementById("chat");

  // mensaje usuario
  const userMsg = document.createElement("div");
  userMsg.className = "user";
  userMsg.innerText = mensaje;
  chat.appendChild(userMsg);

  mensajeInput.value = "";

  // escribiendo...
  const typing = document.createElement("div");
  typing.className = "bot";
  typing.innerText = "Escribiendo...";
  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

  const url = "https://nova-agency06.app.n8n.cloud/webhook/chat?message=" 
    + encodeURIComponent(mensaje) 
    + "&negocio=barberia_demo";

  const res = await fetch(url);
  const data = await res.text();

  typing.remove();

  const botMsg = document.createElement("div");
  botMsg.className = "bot";
  botMsg.innerText = data;
  chat.appendChild(botMsg);

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
